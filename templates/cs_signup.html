<!DOCTYPE html>
<html>
    <head>
        <link rel="stylesheet" href="/static/main.css">
        <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.0.2/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-EVSTQN3/azprG1Anm3QDgpJLIm9Nao0Yz1ztcQTwFspd3yD65VohhpuuCOmLASjC" crossorigin="anonymous">
        <title>Customer_Signup</title>
    </head>
    <body>
        <div class="my_container">
            <nav class="navbar navbar-expand-lg navbar-dark bg-dark">
                <div class="container-fluid">
                  <a class="navbar-brand" href="#">A-Z HOUSEHOLD SERVICES</a>
                </div>
            </nav>
            <div class="my_panel">
                <div class="center"><h3>Signup(Customer)</h3></div>
                <form action="/cs_signup" method="POST">
                <div class="input_form">
                    <div class="row mb-3">
                        <label for="inputEmail3" class="col-sm-2 col-form-label">Email Id:</label>
                        <div class="col-sm-10">
                          <input type="email" name="email" class="form-control" id="inputEmail3" required>
                        </div>
                    </div>
                    <div class="row mb-3">
                        <label for="password" class="col-sm-2 col-form-label">Password:</label>
                        <div class="col-sm-10">
                          <input type="password" name="password" class="form-control" id="password" required>
                        </div>
                    </div>
                    <div class="row mb-3">
                        <label for="fullname" class="col-sm-2 col-form-label">Fullname:</label>
                        <div class="col-sm-10">
                          <input type="text" name="fullname" class="form-control" id="fullname" required>
                        </div>
                    </div>
                    <div class="row mb-3">
                        <label for="phone" class="col-sm-2 col-form-label">Phone:</label>
                        <div class="col-sm-10">
                          <input type="text" name="phone" class="form-control" id="phone" required>
                        </div>
                    </div>
                    <div class="row mb-3">
                        <label for="address" class="col-sm-2 col-form-label">Address:</label>
                        <div class="col-sm-10">
                            <input type="text" name="address" class="form-control" id="address" required>
                        </div>
                    </div>
                    <div class="row mb-3">
                        <label for="pincode" class="col-sm-2 col-form-label">Pincode:</label>
                        <div class="col-sm-10">
                            <input type="text" name="pincode" class="form-control" id="pincode" required>
                        </div>
                    </div>

                    <div class="text-center">
                        <button type="submit" class="btn btn-primary">Submit</button>
                    </div>
                    Existing user?<a href="/login">Login</a>
                    <div class="error_msg">{{msg}}</div>
                </div>
                </form>
            </div>

        </div>
    </body>
</html>
