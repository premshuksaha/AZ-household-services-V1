{%extends "cs_layout.html"%}
{%block content%}
            {%if customer%}
            <div class="my_panel">
                <div class="center"style="margin-top: 79px;"><h3>Edit Profile</h3></div>
                <form action="/edit_csprofile/{{name}}/{{id}}" method="POST">
                <div class="input_form">
                    <div class="row mb-3">
                        <label for="inputEmail3" class="col-sm-2 col-form-label">Email Id:</label>
                        <div class="col-sm-10">
                          <input type="email" class="form-control" name="email" id="inputEmail3" value="{{customer.email}}">
                        </div>
                    </div>
                    <div class="row mb-3">
                        <label for="password" class="col-sm-2 col-form-label">Password:</label>
                        <div class="col-sm-10">
                          <input type="text" class="form-control" name="password" id="password" value="{{customer.password}}">
                        </div>
                    </div>
                    <div class="row mb-3">
                        <label for="fullname" class="col-sm-2 col-form-label">Fullname:</label>
                        <div class="col-sm-10">
                          <input type="text" class="form-control" name="fullname" id="fullname" value="{{customer.fullname}}">
                        </div>
                    </div>
                    <div class="row mb-3" style="margin-top: 15px;">
                        <label for="address" class="col-sm-2 col-form-label">Address:</label>
                        <div class="col-sm-10">
                            <input type="text" class="form-control" name="address" id="address" value="{{customer.address}}">
                        </div>
                    </div>
                    <div class="row mb-3">
                        <label for="pincode" class="col-sm-2 col-form-label">Pincode:</label>
                        <div class="col-sm-10">
                            <input type="text" class="form-control" name="pincode" id="pincode" value="{{customer.pincode}}">
                        </div>
                    </div>
                    <div class="row mb-3">
                        <label for="phone" class="col-sm-2 col-form-label">Phone:</label>
                        <div class="col-sm-10">
                            <input type="text" class="form-control" name="phone" id="phone" value="{{customer.phone}}">
                        </div>
                    </div>
                    <div class="text-center">
                        <button type="submit" class="btn btn-primary">Apply Changes</button>
                        <a href="/cs_home/{{name}}/{{id}}" type="button" class="btn btn-danger" style="margin-left: 7px;">Cancel</a>
                    </div>
                </form>
                </div>
            </div>
            {%else%}
            <h3></h3>
            {%endif%}

{%endblock%}
